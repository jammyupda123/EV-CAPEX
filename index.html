<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV 충전기 시공관리</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdwqgG6KIXaO4cmwj0kAukmRJrPCV22GY",
    authDomain: "simul-sj-bs.firebaseapp.com",
    projectId: "simul-sj-bs",
    storageBucket: "simul-sj-bs.firebasestorage.app",
    messagingSenderId: "899706917405",
    appId: "1:899706917405:web:87921925b679b1ba942cf4"
  };
  firebase.initializeApp(firebaseConfig);
  const _db = firebase.firestore();
  const _USERS_DOC = _db.collection('ev_construction').doc('users_list');
  let _DOC = null;
  let _currentUser = null;

  // 고정 사용자 (단일 사용자 모드)
  _DOC = _db.collection('ev_construction').doc('data_default');
  _currentUser = { id: 'default', name: '시공관리자' };

  async function loadUsers() {
    try { const snap = await _USERS_DOC.get(); return snap.exists ? (snap.data().users || []) : []; }
    catch(e) { return []; }
  }
  async function saveUsers(users) {
    try { await _USERS_DOC.set({ users }); } catch(e) { console.error(e); }
  }
  function selectUser(user) {
    _DOC = _db.collection('ev_construction').doc('data_' + user.id);
    _currentUser = user;
    localStorage.setItem('constr_user_id', user.id);
    localStorage.setItem('constr_user_name', user.name);
    document.getElementById('user-select-overlay').style.display = 'none';
    if(window._onUserSelected) window._onUserSelected();
  }
  async function initUserSelection() {
    const savedId = localStorage.getItem('constr_user_id');
    if (savedId) {
      const users = await loadUsers();
      const found = users.find(u => u.id === savedId);
      if (found) {
        _DOC = _db.collection('ev_construction').doc('data_' + found.id);
        _currentUser = found;
        document.getElementById('user-select-overlay').style.display = 'none';
        if(window._onUserSelected) window._onUserSelected();
        return;
      }
    }
    document.getElementById('user-select-overlay').style.display = 'flex';
    const list = document.getElementById('user-modal-list');
    list.innerHTML = '<div style="text-align:center;padding:15px;color:#999;">불러오는 중...</div>';
    const users = await loadUsers();
    list.innerHTML = '';
    if (users.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:15px;color:#999;font-size:12px;">등록된 사용자가 없습니다</div>';
    } else {
      users.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'um-user-btn';
        btn.innerHTML = '<span class="um-avatar">' + (u.name||'?')[0] + '</span><span>' + u.name + '</span>';
        btn.onclick = () => selectUser(u);
        list.appendChild(btn);
      });
    }
  }
  async function addNewUser() {
    const input = document.getElementById('new-user-name');
    const name = (input.value || '').trim();
    if (!name) return;
    const users = await loadUsers();
    const id = 'u_' + Date.now();
    const newUser = { id, name };
    users.push(newUser);
    await saveUsers(users);
    input.value = '';
    selectUser(newUser);
  }
  // Migration: import from old backup
  async function migrateFromBackup(data) {
    if(!_DOC) return false;
    try { await _DOC.set(data); return true; }
    catch(e) { console.error('Migration failed:', e); return false; }
  }
</script>
<style>
/* 125% 기본 배율 */
html { zoom: 1.25; }
body, #root { height: calc(100vh / 1.25); overflow: hidden; }

:root{
  --bg:#F4F3F0;--s1:#FFF;--s2:#F9F8F6;--s3:#EEECEA;--bd:#E2E0DC;--bd2:#C8C4BE;
  --ink:#1A1916;--ink2:#5A5750;--ink3:#9A958E;
  --acc:#1D4ED8;--accl:#EEF2FF;--accd:rgba(29,78,216,.12);
  --grn:#15803D;--grnd:#F0FDF4;--grn2:#86EFAC;
  --red:#B91C1C;--redd:#FEF2F2;--red2:#FCA5A5;
  --org:#B45309;--orgd:#FFFBEB;--org2:#FDE68A;
  --r:7px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;}
#root{display:flex;flex-direction:column;}

/* 사용자 선택 */
#user-select-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,25,22,.6);z-index:9999;align-items:center;justify-content:center}
.um-modal{background:#fff;border-radius:12px;padding:24px;width:320px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.um-title{font-size:16px;font-weight:700;margin-bottom:4px}
.um-sub{font-size:11px;color:var(--ink3);margin-bottom:16px}
.um-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--bd);border-radius:7px;cursor:pointer;margin-bottom:6px;transition:.12s}
.um-item:hover{background:var(--accl);border-color:var(--acc)}
.um-name{font-size:13px;font-weight:600}
.um-arrow{color:var(--ink3);font-size:12px}
.um-divider{border-top:1px solid var(--bd);margin:12px 0;font-size:10px;color:var(--ink3);text-align:center;position:relative}
.um-divider span{background:#fff;padding:0 8px;position:relative;top:-1px}
.um-add-row{display:flex;gap:6px}
.um-add-row input{flex:1;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;font-size:12px;font-family:inherit}
.um-add-row input:focus{outline:none;border-color:var(--acc)}
.um-add-row button{padding:8px 14px;background:var(--acc);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
#user-label{cursor:pointer;padding:3px 9px;border:1px solid rgba(255,255,255,.25);border-radius:4px;font-size:10px;color:rgba(255,255,255,.85);font-weight:600;font-family:inherit;background:none;position:relative}
#user-label:hover{border-color:rgba(255,255,255,.5)}
#user-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:1px solid var(--bd);border-radius:7px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:160px;z-index:100;overflow:hidden}
.ud-item{padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink)}
.ud-item:hover{background:var(--s2)}
.ud-item.active{background:var(--accl);color:var(--acc);font-weight:600}
.ud-divider{border-top:1px solid var(--bd);margin:2px 0}
.ud-add{color:var(--acc);font-weight:600}
.ud-del{color:var(--red);font-weight:600}

.hdr{height:46px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;}
.hdr-logo{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:9px;}
.hdr-sep{width:1px;height:13px;background:rgba(255,255,255,.2);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:300;}
.hdr-badge{background:rgba(29,78,216,.6);color:#93C5FD;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.05em;}

.layout{display:flex;flex:1;overflow:hidden;}

.sb{width:420px;background:var(--s1);border-right:2px solid var(--bd);box-shadow:4px 0 12px rgba(0,0,0,.06);display:flex;flex-direction:column;flex-shrink:0;z-index:1;}
.sb-sec{padding:10px 10px 7px;}
.sb-label{font-size:14px;font-weight:800;color:var(--ink);letter-spacing:.05em;margin-bottom:7px;}
.btn-add{width:100%;padding:6px 8px;background:var(--accl);border:1px dashed var(--acc);border-radius:var(--r);color:var(--acc);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s;}
.btn-add:hover{background:var(--accd);}
.sb-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:5px 7px;display:grid;grid-template-columns:1fr 1fr;gap:4px;align-content:start;}
.sitem{padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:.12s;border:1px solid var(--bd);background:var(--s2);min-height:0;min-width:0;overflow:hidden;}
.sitem:hover{background:var(--s3,#e8e5e0);border-color:var(--ink3);}
.sitem.active{background:var(--accl);border-color:var(--acc);box-shadow:0 0 0 1px var(--acc);}
.sitem-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sitem.active .sitem-name{color:var(--acc);}
.sitem-meta{font-size:11px;color:var(--ink3);}
.sb-foot{border-top:1px solid var(--bd);padding:9px 10px;display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.sfstat{background:var(--s2);border-radius:5px;padding:6px 8px;}
.sfstat .n{font-size:14px;font-weight:700;color:var(--ink);font-family:'IBM Plex Mono',monospace;}
.sfstat .l{font-size:9px;color:var(--ink3);}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}

/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 18px 9px;flex-shrink:0;}
.topbar-row1{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.site-name{font-size:15px;font-weight:700;}
.site-loc{font-size:11px;color:var(--ink3);}
.charger-tags{display:flex;gap:4px;flex-wrap:wrap;margin-left:4px;}
.ctag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;background:var(--accd);color:var(--acc);border:1px solid rgba(29,78,216,.15);}
.kpi-strip{display:flex;gap:5px;}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 11px;flex:1;position:relative;}
.kpi .kl{font-size:10px;color:var(--ink3);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.kpi .kv{font-size:17px;font-weight:700;color:var(--ink);font-family:'IBM Plex Mono',monospace;}
.kpi .ks{font-size:10px;color:var(--ink3);margin-top:2px;}
.kpi.acc .kv{color:var(--acc);}
.kpi.grn .kv{color:var(--grn);}
.kpi.red .kv{color:var(--red);}
.edit-btn{position:absolute;top:5px;right:5px;background:none;border:1px solid var(--bd);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--ink3);cursor:pointer;font-family:inherit;transition:.12s;}
.edit-btn:hover{border-color:var(--acc);color:var(--acc);}
.inline-edit{background:var(--accl);border:1px solid rgba(29,78,216,.25);border-radius:var(--r);padding:9px;margin-top:5px;position:absolute;left:0;right:0;top:100%;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.12);}

.tabs{display:flex;padding:0 18px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:.12s;font-family:inherit;white-space:nowrap;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}

.content{flex:1;overflow-y:auto;padding:14px 18px 40px;}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;}
.card-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:11px;}

.rl{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--bd);}
.rl:last-child{border-bottom:none;}
.rl-l{font-size:11px;color:var(--ink2);}
.rl-v{font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--ink);}
.rl-v.red{color:var(--red);}
.rl-v.grn{color:var(--grn);}
.rl-v.acc{color:var(--acc);}
.rl-v.org{color:var(--org);}
.rl.big .rl-l{font-size:12px;font-weight:600;color:var(--ink);}
.rl.big .rl-v{font-size:13px;}
.rl.sub .rl-l{padding-left:10px;font-size:10px;color:var(--ink3);}
.rl.sub .rl-v{font-size:10px;color:var(--ink3);}

.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg.full{grid-column:1/-1;}
.fg.triple{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.flbl{font-size:10px;font-weight:600;color:var(--ink2);}
.finput,.fsel{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;color:var(--ink);font-size:12px;font-family:inherit;outline:none;transition:.12s;width:100%;}
.finput:focus,.fsel:focus{border-color:var(--acc);background:#fff;}
input[type="date"]{color-scheme:light;-webkit-text-fill-color:var(--ink);}
.fhint{font-size:9px;color:var(--ink3);}
.fauto{background:var(--accl);border:1px solid rgba(29,78,216,.2);border-radius:5px;padding:6px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--acc);font-weight:600;}
.fauto.zero{background:var(--s2);border-color:var(--bd);color:var(--ink3);}

.btn-p{background:var(--acc);color:#fff;border:none;padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s;}
.btn-p:hover{background:#1E40AF;}
.btn-s{background:var(--s2);color:var(--ink2);border:1px solid var(--bd);padding:6px 14px;border-radius:var(--r);font-size:11px;font-family:inherit;cursor:pointer;}
.btn-ico{background:none;border:1px solid var(--bd);border-radius:4px;padding:3px 7px;font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;transition:.12s;}
.btn-ico:hover{border-color:var(--red);color:var(--red);}

.tog-wrap{display:flex;gap:3px;}
.tog{flex:1;padding:5px 2px;text-align:center;font-size:11px;font-weight:600;font-family:inherit;border-radius:5px;cursor:pointer;border:1px solid var(--bd);color:var(--ink2);background:var(--s2);transition:.12s;}
.tog:hover{border-color:var(--acc);color:var(--acc);}
.tog.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.tog.on-grn{background:var(--grn);border-color:var(--grn);color:#fff;}
.tog.on-org{background:var(--org);border-color:var(--org);color:#fff;}

.chk-row{display:flex;align-items:center;gap:6px;padding:5px 0;cursor:pointer;user-select:none;}
.chk-box{width:14px;height:14px;border:1.5px solid var(--bd2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--s2);transition:.12s;}
.chk-box.on{background:var(--acc);border-color:var(--acc);}
.chk-lbl{font-size:11px;color:var(--ink2);}

/* SIM */
.sim-layout{display:flex;flex-direction:column;gap:11px;}
.cpanel{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;display:grid;grid-template-columns:1fr 0.75fr 1.25fr;gap:10px;align-items:start;}
.cpanel-section{display:flex;flex-direction:column;gap:10px;}
.cp-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}
.cp-row{display:flex;flex-direction:column;gap:3px;}
.cp-input,.cp-sel{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;color:var(--ink);font-size:12px;font-family:inherit;outline:none;transition:.12s;width:100%;}
.cp-input:focus,.cp-sel:focus{border-color:var(--acc);}
.cp-hint{font-size:10px;color:var(--ink3);}
.cp-hint.acc{color:var(--acc);font-weight:600;}
.cp-hint.org{color:var(--org);font-weight:600;}
.cp-divider{display:none;}
.rpanel{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
.rpanel-verdict{grid-column:1/-1;}

.pbar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.pbar-lbl{font-size:9px;color:var(--ink2);width:68px;flex-shrink:0;}
.pbar-track{flex:1;background:var(--bd);border-radius:3px;height:5px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.pbar-val{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--ink2);width:44px;text-align:right;flex-shrink:0;}

.verdict{border-radius:var(--r);padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}
.verdict.go  {background:var(--grnd);border:1px solid var(--grn2);}
.verdict.warn{background:var(--orgd);border:1px solid var(--org2);}
.verdict.stop{background:var(--redd);border:1px solid var(--red2);}
.verdict-ico{font-size:15px;flex-shrink:0;}
.verdict-body .vt{font-size:12px;font-weight:700;margin-bottom:2px;}
.verdict.go .vt{color:var(--grn);}
.verdict.warn .vt{color:var(--org);}
.verdict.stop .vt{color:var(--red);}
.verdict-body .vd{font-size:10px;color:var(--ink2);line-height:1.6;}

/* COST */
.cost-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cost-total-box{background:var(--ink);color:#fff;border-radius:var(--r);padding:12px;}
.ct-label{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.ct-val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.ct-sub{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);}
.cost-row:last-child{border-bottom:none;}
.cost-row-label{font-size:11px;color:var(--ink2);}
.cost-row-val{font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.cost-row-val.grn{color:var(--grn);}
.cost-row-val.red{color:var(--red);}
.cost-row-val.org{color:var(--org);}
.cost-row-val.dim{color:var(--ink3);font-weight:400;}

.charger-item-row{display:grid;grid-template-columns:68px 120px 52px 52px 90px 80px 24px;gap:5px;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);}
.charger-item-row:last-of-type{border-bottom:none;}
.cir-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc);padding:4px 6px;background:var(--accl);border-radius:4px;text-align:right;}

.vat-breakdown{border:1px solid var(--bd);border-radius:5px;overflow:hidden;margin-top:5px;}
.vat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;}
.vat-row .vl{font-size:10px;color:var(--ink3);}
.vat-row .vv{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:10px;color:var(--ink);}
.vat-row.vat-total{border-top:1px solid var(--bd);background:var(--accl);padding:5px 10px;}
.vat-row.vat-total .vl{font-weight:700;color:var(--ink);font-size:10px;}
.vat-row.vat-total .vv{font-weight:700;font-size:11px;color:var(--acc);}

.subsidy-row{background:var(--grnd);border:1px solid var(--grn2);border-radius:5px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;}

/* COMPARE */
.ctable{width:100%;border-collapse:collapse;font-size:11px;}
.ctable th{padding:6px 9px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--bd);background:var(--s2);}
.ctable td{padding:6px 9px;border-bottom:1px solid var(--bd);color:var(--ink);}
.ctable tr:last-child td{border-bottom:none;}
.ctable tr:hover td{background:var(--s2);}
.ctable td.mono{font-family:'IBM Plex Mono',monospace;}
.ctable td.red{color:var(--red);font-weight:600;}
.ctable td.grn{color:var(--grn);font-weight:600;}
.ctable td.acc{color:var(--acc);font-weight:600;}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;}
.ba{background:#F3E8FF;color:#6D28D9;}
.bb{background:#E0F2FE;color:#0369A1;}
.bc{background:#CCFBF1;color:#0D9488;}
.bn{background:#FEF3C7;color:#92400E;}

.divider{height:1px;background:var(--bd);margin:9px 0;}

<!-- 사용자 선택 제거됨 -->
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

/* ─── Constants ─── */
const SAFETY_T={
  general: {label:'일반', base:44000, perKw:1059},
  perform: {label:'공연장/영화상영관', base:109000, perKw:922},
  hospital:{label:'종합병원/호텔/카지노/국제회의', base:145000, perKw:971},
  mall:    {label:'대형마트/백화점/쇼핑센터', base:164000, perKw:1045},
};
const CHARGER_MODELS={
  100:['HEV-Q2100','HEV-Q1100'],
  50: ['HEV-Q2050','HEV-Q1050'],
  7:  ['HEV-S1007A','HEV-S1007/HE7','HEV-S1007/HEU7','HEV-S21007','HEV-Q1050','HEV-Q1100','HEV-Q2050','HEV-Q2100'],
  3.5:['HEV','Costel','기타'],
};
const CHARGER_KW=[100,50,7,3.5];
const REGIONS=['서울','인천광역시','경기도','충청북도','충청남도','강원도','경상북도','경상남도','전라북도','전라남도','제주도'];
const LS_KEY='ev_construction_mgr';
const SITES0=[{id:1,name:'새 현장',address:'',region:'서울',aboveGround:0,underground:0}];
const COST0={
  contractKW:0,buildingType:'general',powerSupplyType:'신규수전(지중)',
  powerPoints:null, workTime:'주간',
  includeInsp:false, includeSafety:true, includeKepco:true, includeSupv:true,
  includeElecMgr:true, includeInspection:true, includeInsurance:true,
  elecMgrFee:0, inspectionCount:1,
  subsidyApplied:false,
  buildingInvestment:false, buildingFundAmount:0, buildingMarginRate:15,
  chargerItems:[{id:1,kw:7,model:'HEV-S1007A',location:'옥내',qty:0,unitPrice:0}],
  standQty:0,standUnitPrice:0,
  canopyQty:0,canopyUnitPrice:0,
  elecItems:[],
  installLocations:[], // 세부설치위치
};
const POWER_POINT_0=(n)=>({id:Date.now()+n, label:`거점 ${n}`, contractKW:0, powerSupplyType:'신규수전(지중)', includeInsp:false, includeSafety:true, installLocations:[]});

/* ─── Fee calculators ─── */
const calcInsp   = kw => kw>0 ? Math.floor((94000+kw*391)/10)*10 : 0;
const calcSafety = (kw,t) => { if(!kw)return 0; const d=SAFETY_T[t]||SAFETY_T.general; return Math.floor((d.base+kw*d.perKw)/10)*10; };
const calcKepco  = (kw,sup) => {
  if(!kw)return 0;
  if(sup==='모자분리')return 0;
  if(sup==='신규수전(지중)')return kw<=5?588000:588000+(kw-5)*141000;
  return kw<=5?306000:306000+(kw-5)*121000;
};
const calcSupv   = kw => { if(!kw)return 0; if(kw<=130)return 800000; if(kw<=160)return 900000; if(kw<=200)return 1000000; if(kw<=300)return 1100000; if(kw<=400)return 1200000; return 1300000; };
function calcSubsidyMax(qty){ if(qty<=0)return 0; if(qty===1)return 220; const q1=1,q2=Math.min(qty,5)-1,q3=Math.max(qty-5,0); return q1*220+q2*200+q3*180; }
function calcSubsidy(subsidyBaseEx,qty){ if(!qty||!subsidyBaseEx)return 0; const half=Math.round(subsidyBaseEx/10000*0.5*10)/10; return Math.min(half,calcSubsidyMax(qty)); }
const calcInsurance = total => total<=0?0:total<=6?20000:total*3208;
function calcInspection(chargerItems){
  if(!chargerItems||chargerItems.length===0)return 0;
  const slow=chargerItems.filter(i=>parseFloat(i.kw)<=7).reduce((s,i)=>s+(i.qty||0),0);
  const fast100=chargerItems.filter(i=>parseFloat(i.kw)>7&&parseFloat(i.kw)<=100).reduce((s,i)=>s+(i.qty||0),0);
  const fast400=chargerItems.filter(i=>parseFloat(i.kw)>100&&parseFloat(i.kw)<=400).reduce((s,i)=>s+(i.qty||0),0);
  const fast400p=chargerItems.filter(i=>parseFloat(i.kw)>400).reduce((s,i)=>s+(i.qty||0),0);
  const hasFast=fast100+fast400+fast400p>0;
  const base=hasFast?170000:(slow>0?43000:0);
  return base+fast100*46000+fast400*55400+fast400p*62500+slow*7700;
}
const toMan = v => Math.round((parseFloat(v)||0)/10000);

const fW = v => {
  if(v==null||isNaN(parseFloat(v)))return'-';
  const f=parseFloat(v),sign=f<0?'-':'',abs=Math.abs(Math.round(f));
  if(abs>=10000){const uk=Math.floor(abs/10000),man=abs%10000; return sign+(man>0?uk+'억 '+man.toLocaleString()+'만원':uk+'억원');}
  return sign+abs.toLocaleString()+'만원';
};
const fWon = v => { if(!v&&v!==0)return'-'; return Math.round(Math.abs(v)).toLocaleString()+'원'; };
function mergePowerPoints(pts){ return (pts||[]).reduce((s,p)=>s+(parseFloat(p.contractKW)||0),0); }

function calcCostTotals(cd) {
  const pts = cd.powerPoints && cd.powerPoints.length>0 ? cd.powerPoints : null;
  const kw = pts ? mergePowerPoints(pts) : (parseFloat(cd.contractKW)||0);
  const inspEx_pts  = pts ? pts.filter(p=>p.includeInsp!==false).reduce((s,p)=>s+calcInsp(parseFloat(p.contractKW)||0),0) : 0;
  const safetyEx_pts= pts ? pts.filter(p=>p.includeSafety!==false).reduce((s,p)=>s+calcSafety(parseFloat(p.contractKW)||0,cd.buildingType),0) : 0;
  const kepcoEx_pts = pts ? pts.reduce((s,p)=>s+calcKepco(parseFloat(p.contractKW)||0,p.powerSupplyType||'신규수전(지중)'),0) : 0;
  const totalChargers=(cd.chargerItems||[]).reduce((s,i)=>s+(i.qty||0),0);
  const chargerExVAT=(cd.chargerItems||[]).reduce((s,i)=>s+(i.qty||0)*(i.unitPrice||0),0);
  const standExVAT=(cd.standQty||0)*(cd.standUnitPrice||0);
  const canopyExVAT=(cd.canopyQty||0)*(cd.canopyUnitPrice||0);
  const elecExVAT=(cd.elecItems||[]).reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.unitPrice)||0),0);
  const inspEx      = cd.includeInsp   ? (pts ? inspEx_pts   : calcInsp(kw)) : 0;
  const safetyEx    = cd.includeSafety ? (pts ? safetyEx_pts : calcSafety(kw,cd.buildingType)) : 0;
  const kepcoEx     = pts ? kepcoEx_pts : calcKepco(kw,cd.powerSupplyType);
  const supervEx    = cd.includeSupv   ? calcSupv(kw) : 0;
  const elecMgrEx   = cd.includeElecMgr ? (parseFloat(cd.elecMgrFee)||0) : 0;
  const inspCnt=cd.inspectionCount||1;
  const inspectionInc=cd.includeInspection?calcInspection(cd.chargerItems)*inspCnt:0;
  const inspectionEx =Math.round(inspectionInc/1.1);
  const insuranceInc =cd.includeInsurance ?calcInsurance(totalChargers):0;
  const insuranceEx  =insuranceInc;
  const legalCostEx=inspEx+safetyEx+kepcoEx+supervEx;
  const legalEx=legalCostEx+elecMgrEx+inspectionEx+insuranceEx;
  const totalBEx=chargerExVAT+standExVAT+elecExVAT+legalCostEx;
  const totalBVT=Math.round(totalBEx*.1);
  const totalBIn=totalBEx+totalBVT;
  const totalCEx=chargerExVAT+standExVAT+canopyExVAT+elecExVAT+legalCostEx;
  const totalCVT=Math.round(totalCEx*.1);
  const totalCIn=totalCEx+totalCVT;
  const subsidyBaseEx=chargerExVAT+standExVAT+canopyExVAT+elecExVAT+kepcoEx;
  const subsidyChargerEx=Math.round(chargerExVAT/2);
  const subsidyStandEx=Math.round(standExVAT/2);
  const subsidyCanopyEx=Math.round(canopyExVAT/2);
  const subsidyElecEx=Math.round(elecExVAT/2);
  const subsidyKepcoEx=Math.round(kepcoEx/2);
  const subsidyAmt=cd.subsidyApplied?Math.round(calcSubsidy(subsidyBaseEx,totalChargers)*10000):0;
  const subsidyC=subsidyAmt;
  const netCWon=totalCIn+inspectionInc+insuranceInc+(parseFloat(cd.elecMgrFee)||0)*inspCnt-subsidyC;
  return {
    chargerExVAT,standExVAT,canopyExVAT,elecExVAT,legalEx,legalCostEx,
    inspEx,safetyEx,kepcoEx,supervEx,elecMgrEx,inspectionEx,insuranceEx,
    inspectionInc,insuranceInc,totalChargers,inspCnt,
    totalBEx,totalBVT,totalBIn,totalCEx,totalCVT,totalCIn,
    subsidyBaseEx,subsidyChargerEx,subsidyStandEx,subsidyCanopyEx,subsidyElecEx,subsidyKepcoEx,
    subsidyAmt,subsidyC,netCWon,
    totalBMan:toMan(totalBIn),totalCMan:toMan(totalCIn),netCMan:toMan(netCWon),
  };
}

/* ─── Data Persistence ─── */
let _isSavingToFirebase = false;
async function loadLS(){
  try{
    if(!_DOC) throw new Error('No Firestore doc');
    const snap = await _DOC.get();
    if(snap.exists){
      const data = snap.data();
      try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); }catch(e){}
      console.log('✅ Firestore 로드 성공:', Object.keys(data));
      return data;
    } else {
      console.log('📭 Firestore 문서 없음 — localStorage 시도');
    }
  }catch(e){ console.warn('⚠️ Firebase 로드 실패:', e); }
  try{
    const d=localStorage.getItem(LS_KEY);
    if(d){ console.log('💾 localStorage 로드 성공'); return JSON.parse(d); }
  }catch(e){}
  console.log('❌ 저장된 데이터 없음');
  return null;
}
function stripUndefined(obj){
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  if(obj && typeof obj==='object'){
    const out={};
    for(const[k,v]of Object.entries(obj)){
      if(v!==undefined) out[k]=stripUndefined(v);
    }
    return out;
  }
  return obj;
}
let _saveStatus = 'idle'; // idle, saving, saved, error
async function saveLS(d){
  d = stripUndefined(d);
  try{ localStorage.setItem(LS_KEY,JSON.stringify(d)); }catch(e){}
  if(!_DOC){ _saveStatus='saved'; if(window._onSaveStatus)window._onSaveStatus('saved'); return; }
  try{
    _saveStatus='saving'; if(window._onSaveStatus)window._onSaveStatus('saving');
    _isSavingToFirebase = true;
    await _DOC.set(d);
    _saveStatus='saved'; if(window._onSaveStatus)window._onSaveStatus('saved');
    setTimeout(()=>{ _isSavingToFirebase = false; }, 2500);
  }catch(e){
    _isSavingToFirebase = false;
    _saveStatus='error'; if(window._onSaveStatus)window._onSaveStatus('error');
    console.warn('Firebase 저장 실패:', e);
  }
}
function exportData(data){
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='ev_construction_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(url);
}
function importData(onSuccess){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.sites&&data.costMap){
          // Support importing from old simulation backup
          if(!data.sites[0].hasOwnProperty('address')){
            data.sites = data.sites.map(s=>({...s, address:s.location||'', location:undefined}));
          }
          onSuccess(data);
        } else { alert('올바른 백업 파일이 아닙니다.'); }
      }catch(err){ alert('파일 파싱 오류: '+err.message); }
    };
    reader.readAsText(file);
  };

function NumInput({value, onChange, placeholder, style, className}){
  const [local,setLocal]=useState(value==null?'':String(value));
  useEffect(()=>{ setLocal(value==null?'':String(value)); },[value]);
  const commit=()=>{ const n=parseFloat(local); onChange(isNaN(n)?0:n); };
  return <input type="text" inputMode="decimal" className={className||'cp-input'}
    value={local} placeholder={placeholder} style={style}
    onChange={e=>setLocal(e.target.value)}
    onBlur={commit} onKeyDown={e=>{ if(e.key==='Enter'){e.target.blur();} }}
  />;
}

function CostTab({site,cd,sm,updCost}){
  const set=(k,v)=>updCost({[k]:v});
  const kw=parseFloat(cd.contractKW)||0;
  // Which case is currently active in sim tab
  const activeCaseType=sm?.contractType==='new'?'N':(sm?.caseType||'B');

  // Charger items CRUD
  // Charger items CRUD — ID를 현재 항목에서 매번 계산
  const addChargerItem=()=>{
    const items=cd.chargerItems||[];
    const id=items.length===0?100:Math.max(...items.map(i=>i.id||0))+1;
    updCost({chargerItems:[...items,{id,kw:7,model:'HEV-S1007A',location:'옥내',qty:0,unitPrice:0}]});
  };
  const updChargerItem=(id,p)=>updCost({chargerItems:(cd.chargerItems||[]).map(i=>i.id===id?{...i,...p}:i)});
  const delChargerItem=(id)=>updCost({chargerItems:(cd.chargerItems||[]).filter(i=>i.id!==id)});

  // Elec items CRUD — ID를 현재 항목에서 매번 계산
  const addElecItem=()=>{
    const items=cd.elecItems||[];
    const id=items.length===0?200:Math.max(...items.map(i=>i.id||0))+1;
    updCost({elecItems:[...items,{id,name:'',qty:0,unit:'식',unitPrice:0}]});
  };
  const updElecItem=(id,p)=>updCost({elecItems:(cd.elecItems||[]).map(i=>i.id===id?{...i,...p}:i)});
  const delElecItem=(id)=>updCost({elecItems:(cd.elecItems||[]).filter(i=>i.id!==id)});

  const ct=useMemo(()=>calcCostTotals(cd),[cd]);

  const Chk=({k,label})=><div className="chk-row" onClick={()=>set(k,!cd[k])}>
    <div className={`chk-box ${cd[k]?'on':''}`}>{cd[k]&&<span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}</div>
    <span className="chk-lbl">{label}</span>
  </div>;

  const VatBreak=({ex,label})=>{
    return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:5,padding:'5px 8px',background:'var(--s2)',borderRadius:5,border:'1px solid var(--bd)'}}>
      <span style={{fontSize:10,fontWeight:600,color:'var(--ink3)'}}>{label||'소계'}</span>
      <span style={{fontSize:11,fontFamily:'IBM Plex Mono',fontWeight:700,color:'var(--ink)',marginLeft:12}}>{fWon(ex)}</span>
    </div>;
  };

  // 거점 목록 (powerPoints 배열 우선, 없으면 단일값에서 마이그레이션)
  const powerPoints = cd.powerPoints && cd.powerPoints.length>0 ? cd.powerPoints
    : cd.contractKW ? [{...POWER_POINT_0(1), contractKW:cd.contractKW, powerSupplyType:cd.powerSupplyType||'신규수전(지중)'}]
    : [POWER_POINT_0(1)];
  const totalKW = mergePowerPoints(powerPoints);
  const updPP=(id,patch)=>updCost({powerPoints:powerPoints.map(p=>p.id===id?{...p,...patch}:p), contractKW:mergePowerPoints(powerPoints.map(p=>p.id===id?{...p,...patch}:p))});
  const addPP=()=>{ const n=powerPoints.length+1; const np=[...powerPoints,POWER_POINT_0(n)]; updCost({powerPoints:np,contractKW:mergePowerPoints(np)}); };
  const removePP=(id)=>{ if(powerPoints.length<=1)return; const np=powerPoints.filter(p=>p.id!==id); updCost({powerPoints:np,contractKW:mergePowerPoints(np)}); };

  const ppHint = powerPoints.length>1?`(${powerPoints.length}개 거점 합산)`:'';
  const autoFees=[
    {key:'includeInsp',      label:'사용전검사비',     ex:ct.inspEx,       formula:powerPoints.length>1?`거점별 합산 ${ppHint}`:`94,000 + ${totalKW}kW × 391원`, managed:powerPoints.length>1},
    {key:'includeSafety',    label:'전기안전점검비',   ex:ct.safetyEx,     formula:powerPoints.length>1?`거점별 합산 ${ppHint}`:`${SAFETY_T[cd.buildingType||'general']?.label} 기준`, managed:powerPoints.length>1},
    {key:'includeKepco',     label:'한전불입금',       ex:ct.kepcoEx,      formula:powerPoints.length>1?`거점별 수전방식 합산 ${ppHint}`:`${(powerPoints[0]?.powerSupplyType)||cd.powerSupplyType||'신규수전(지중)'} 기준`},
    {key:'includeSupv',      label:'감리비',           ex:ct.supervEx,     formula:`${kw}kW 구간`},
    {key:'includeElecMgr',   label:'전기안전관리자',   ex:ct.elecMgrEx,    formula:'직접 입력', hasInput:true},
    {key:'includeInspection',label:'정기검사',         ex:ct.inspectionEx, hasCountInput:true, formula:(()=>{
      const ci=cd.chargerItems||[];
      const sw=ci.filter(i=>parseFloat(i.kw)<=7).reduce((s,i)=>s+(i.qty||0),0);
      const f1=ci.filter(i=>parseFloat(i.kw)>7&&parseFloat(i.kw)<=100).reduce((s,i)=>s+(i.qty||0),0);
      const f2=ci.filter(i=>parseFloat(i.kw)>100&&parseFloat(i.kw)<=400).reduce((s,i)=>s+(i.qty||0),0);
      const f3=ci.filter(i=>parseFloat(i.kw)>400).reduce((s,i)=>s+(i.qty||0),0);
      const hf=f1+f2+f3>0;
      if(!sw&&!hf) return '충전기 미입력';
      const fastParts=[];
      if(f1>0) fastParts.push(`100kW이하 ${f1}기×46,000`);
      if(f2>0) fastParts.push(`400kW이하 ${f2}기×55,400`);
      if(f3>0) fastParts.push(`400kW초과 ${f3}기×62,500`);
      if(hf&&sw>0) return `혼합: 170,000 + ${fastParts.join(' + ')} + 완속 ${sw}기×7,700`;
      if(hf) return `급속: 170,000 + ${fastParts.join(' + ')}`;
      return `완속: 43,000 + ${sw}기×7,700`;
    })()},
    {key:'includeInsurance', label:'보험료',           ex:ct.insuranceEx,  formula:`${ct.totalChargers}기 × ${ct.totalChargers<=6?'20,000원 고정':'3,208원/기'} (공급가액)`},
  ];



  return <div className="cost-layout">
    {/* ── LEFT ── */}
    <div className="cost-col-1" style={{display:'flex',flexDirection:'column',gap:10}}>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div className="card-title" style={{marginBottom:0}}>⚡ 계약전력 및 건물 정보</div>
          <button onClick={addPP}
            style={{fontSize:10,fontWeight:700,padding:'3px 10px',background:'var(--accl)',border:'1px solid var(--acc)',borderRadius:5,color:'var(--acc)',cursor:'pointer',fontFamily:'inherit'}}>
            + 거점 추가
          </button>
        </div>

        {/* 거점별 계약전력 카드 */}
        <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:10}}>
          {powerPoints.map((pp,pi)=>{
            const ppKW=parseFloat(pp.contractKW)||0;
            const inspAmt=pp.includeInsp!==false?calcInsp(ppKW):0;
            const safetyAmt=pp.includeSafety!==false?calcSafety(ppKW,cd.buildingType):0;
            const kepcoAmt=calcKepco(ppKW,pp.powerSupplyType||'신규수전(지중)');
            return <div key={pp.id} style={{background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:7,padding:'9px 10px'}}>
              {/* 거점 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
                <span style={{fontSize:10,fontWeight:700,color:'var(--acc)',fontFamily:'IBM Plex Mono',flexShrink:0}}>#{pi+1}</span>
                <input style={{flex:1,fontSize:11,fontWeight:600,background:'transparent',border:'none',borderBottom:'1px solid var(--bd)',outline:'none',color:'var(--ink)',padding:'1px 3px',fontFamily:'inherit'}}
                  value={pp.label||`거점 ${pi+1}`} onChange={e=>updPP(pp.id,{label:e.target.value})} placeholder={`거점 ${pi+1}`}/>
                {powerPoints.length>1&&<button onClick={()=>removePP(pp.id)}
                  style={{width:20,height:20,borderRadius:4,border:'1px solid var(--red2)',background:'var(--redd)',color:'var(--red)',cursor:'pointer',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit'}}>×</button>}
              </div>
              {/* 계약전력 + 수전방식 */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:7}}>
                <div>
                  <div className="flbl">계약전력 (kW)</div>
                  <input className="finput" type="number" step="1" value={pp.contractKW||''} placeholder="kW"
                    onChange={e=>updPP(pp.id,{contractKW:+e.target.value})}/>
                </div>
                <div>
                  <div className="flbl">수전방식</div>
                  <div style={{display:'flex',flexDirection:'column',gap:3,marginTop:2}}>
                    {['모자분리','신규수전(지중)','신규수전(가공)'].map(v=>(
                      <button key={v} className={`tog ${(pp.powerSupplyType||'신규수전(지중)')===v?'on':''}`}
                        style={{fontSize:10,padding:'3px 4px',textAlign:'left'}}
                        onClick={()=>updPP(pp.id,{powerSupplyType:v})}>{v}</button>
                    ))}
                  </div>
                  {(pp.powerSupplyType||'신규수전(지중)')==='모자분리'&&<div className="fhint" style={{color:'var(--grn)',marginTop:2}}>한전불입금 없음</div>}
                </div>
              </div>
              {/* 세부설치위치 */}
              <div style={{borderTop:'1px dashed var(--bd)',paddingTop:6,marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{fontSize:9,fontWeight:700,color:'var(--ink3)'}}>📍 세부 설치위치</div>
                  <button onClick={()=>{
                    const locs=pp.installLocations||[];
                    updPP(pp.id,{installLocations:[...locs,{id:Date.now(),name:'',detail:''}]});
                  }} style={{fontSize:9,fontWeight:700,padding:'2px 7px',background:'var(--accl)',border:'1px solid var(--acc)',borderRadius:4,color:'var(--acc)',cursor:'pointer',fontFamily:'inherit'}}>+ 추가</button>
                </div>
                {(pp.installLocations||[]).length===0
                  ? <div style={{fontSize:9,color:'var(--ink3)',padding:'4px 0'}}>설치위치를 추가하세요</div>
                  : (pp.installLocations||[]).map((loc,li)=>(
                    <div key={loc.id} style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>
                      <span style={{fontSize:9,fontWeight:700,color:'var(--acc)',fontFamily:'IBM Plex Mono',flexShrink:0}}>{li+1}</span>
                      <input placeholder="예: B1F / 13기둥 / 5기" value={loc.detail||''}
                        onChange={e=>{const nl=[...(pp.installLocations||[])]; nl[li]={...nl[li],detail:e.target.value}; updPP(pp.id,{installLocations:nl});}}
                        style={{flex:1,padding:'4px 6px',fontSize:10,border:'1px solid var(--bd)',borderRadius:4,background:'#fff',color:'var(--ink)',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
                      <button onClick={()=>{const nl=(pp.installLocations||[]).filter(l=>l.id!==loc.id); updPP(pp.id,{installLocations:nl});}}
                        style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--red)',padding:'0 2px',lineHeight:1,flexShrink:0}}>×</button>
                    </div>
                  ))
                }
              </div>
              {/* 자동계산 비용 체크박스 */}
              {ppKW>0&&<div style={{borderTop:'1px dashed var(--bd)',paddingTop:6,display:'flex',flexDirection:'column',gap:3}}>
                <div style={{fontSize:9,fontWeight:700,color:'var(--ink3)',marginBottom:2}}>자동 계산 비용</div>
                {/* 사용전검사비 */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 6px',
                  background:pp.includeInsp!==false?'var(--accl)':'var(--s3)',
                  border:`1px solid ${pp.includeInsp!==false?'rgba(29,78,216,.2)':'var(--bd)'}`,
                  borderRadius:4,cursor:'pointer'}}
                  onClick={()=>updPP(pp.id,{includeInsp:pp.includeInsp===false?true:false})}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <div style={{width:13,height:13,borderRadius:3,flexShrink:0,
                      border:`2px solid ${pp.includeInsp!==false?'var(--acc)':'var(--bd)'}`,
                      background:pp.includeInsp!==false?'var(--acc)':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {pp.includeInsp!==false&&<span style={{color:'#fff',fontSize:8,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:10,color:pp.includeInsp!==false?'var(--acc)':'var(--ink3)',fontWeight:600}}>사용전검사비</span>
                    <span style={{fontSize:9,color:'var(--ink3)'}}>94,000 + {ppKW}kW×391원</span>
                  </div>
                  <span style={{fontSize:10,fontFamily:'IBM Plex Mono',fontWeight:700,color:pp.includeInsp!==false?'var(--acc)':'var(--ink3)'}}>
                    {pp.includeInsp!==false?fWon(inspAmt):'제외'}
                  </span>
                </div>
                {/* 전기안전점검비 */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 6px',
                  background:pp.includeSafety!==false?'var(--accl)':'var(--s3)',
                  border:`1px solid ${pp.includeSafety!==false?'rgba(29,78,216,.2)':'var(--bd)'}`,
                  borderRadius:4,cursor:'pointer'}}
                  onClick={()=>updPP(pp.id,{includeSafety:pp.includeSafety===false?true:false})}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <div style={{width:13,height:13,borderRadius:3,flexShrink:0,
                      border:`2px solid ${pp.includeSafety!==false?'var(--acc)':'var(--bd)'}`,
                      background:pp.includeSafety!==false?'var(--acc)':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {pp.includeSafety!==false&&<span style={{color:'#fff',fontSize:8,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:10,color:pp.includeSafety!==false?'var(--acc)':'var(--ink3)',fontWeight:600}}>전기안전점검비</span>
                    <span style={{fontSize:9,color:'var(--ink3)'}}>({SAFETY_T[cd.buildingType||'general']?.label})</span>
                  </div>
                  <span style={{fontSize:10,fontFamily:'IBM Plex Mono',fontWeight:700,color:pp.includeSafety!==false?'var(--acc)':'var(--ink3)'}}>
                    {pp.includeSafety!==false?fWon(safetyAmt):'제외'}
                  </span>
                </div>
                {/* 한전불입금 (수전방식에 따라 자동) */}
                {(pp.powerSupplyType||'신규수전(지중)')!=='모자분리'&&kepcoAmt>0&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 6px',background:'var(--grnd)',border:'1px solid var(--grn2)',borderRadius:4}}>
                  <span style={{fontSize:10,color:'var(--grn)',fontWeight:600}}>한전불입금 ({pp.powerSupplyType||'신규수전(지중)'})</span>
                  <span style={{fontSize:10,fontFamily:'IBM Plex Mono',fontWeight:700,color:'var(--grn)'}}>{fWon(kepcoAmt)}</span>
                </div>}
              </div>}
            </div>;
          })}
        </div>

        {/* 합계 표시 */}
        {powerPoints.length>1&&<div style={{padding:'6px 10px',background:'var(--ink)',borderRadius:6,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:10,color:'rgba(255,255,255,.6)',fontWeight:600}}>총 계약전력 ({powerPoints.length}개 거점 합산)</span>
          <span style={{fontSize:13,fontWeight:700,color:'#fff',fontFamily:'IBM Plex Mono'}}>{totalKW} kW</span>
        </div>}

        {/* 건물유형 + 보조금 (기존 유지) */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,borderTop:'1px solid var(--bd)',paddingTop:8}}>
          <div>
            <div className="flbl" style={{marginBottom:4}}>건물 유형 (전기안전점검비)</div>
            <select className="fsel" value={cd.buildingType||'general'} onChange={e=>set('buildingType',e.target.value)}>
              {Object.entries(SAFETY_T).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div>
            <div className="flbl" style={{marginBottom:4}}>💸 보조금 (Case C)</div>
            <div className="tog-wrap" style={{flexDirection:'column',gap:3}}>
              <button className={`tog ${!cd.subsidyApplied?'on':''}`} onClick={()=>set('subsidyApplied',false)}>미신청 (0%)</button>
              <button className={`tog ${cd.subsidyApplied?'on-grn':''}`} onClick={()=>set('subsidyApplied',true)}>신청 (50% 지원)</button>
            </div>
            {cd.subsidyApplied&&<div style={{marginTop:4,fontSize:10,color:'var(--grn)',fontWeight:600}}>총 투자비의 50% 차감</div>}
          </div>
        </div>

        {/* 🏢 건물주 투자 모드 ─ 우리가 투자하지 않고 건물측이 일정 금액을 투자하며,
             우리는 그 금액으로 공사비를 집행 → 차액(투자금-공사비)이 당사 마진 */}
        <div style={{marginTop:10,padding:'8px 10px',background:cd.buildingInvestment?'var(--orgd)':'var(--s2)',border:`1px solid ${cd.buildingInvestment?'var(--org2)':'var(--bd)'}`,borderRadius:6,transition:'.15s',display:'flex',alignItems:'center',gap:10,flexWrap:'nowrap'}}>
          <div className="flbl" style={{margin:0,whiteSpace:'nowrap',flexShrink:0}}>🏢 투자 주체</div>
          <div className="tog-wrap" style={{margin:0,flexShrink:0,display:'flex',gap:3}}>
            <button className={`tog ${!cd.buildingInvestment?'on':''}`} style={{whiteSpace:'nowrap',flex:'0 0 auto',padding:'4px 10px'}} onClick={()=>set('buildingInvestment',false)}>당사 투자</button>
            <button className={`tog ${cd.buildingInvestment?'on-org':''}`} style={cd.buildingInvestment?{background:'var(--org)',borderColor:'var(--org)',color:'#fff',whiteSpace:'nowrap',flex:'0 0 auto',padding:'4px 10px'}:{whiteSpace:'nowrap',flex:'0 0 auto',padding:'4px 10px'}} onClick={()=>set('buildingInvestment',true)}>건물측 투자</button>
          </div>
          {cd.buildingInvestment&&<div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0,marginLeft:'auto',whiteSpace:'nowrap'}}>
            <span style={{fontSize:10,color:'var(--org)',fontWeight:700}}>투자금액</span>
            <span style={{fontSize:8,color:'var(--org)',fontWeight:700,opacity:0.7}}>VAT별도</span>
            <input
              className="cp-input"
              type="text"
              inputMode="numeric"
              placeholder="0"
              value={cd.buildingFundAmount?Number(cd.buildingFundAmount).toLocaleString('ko-KR'):''}
              onChange={e=>{
                const raw=e.target.value.replace(/[^\d]/g,'');
                set('buildingFundAmount',raw?parseInt(raw,10):0);
              }}
              style={{width:120,fontSize:11,fontWeight:700,textAlign:'right',color:'var(--org)'}}
            />
            <span style={{fontSize:10,color:'var(--org)',fontWeight:700}}>원</span>
          </div>}
        </div>
        {cd.buildingInvestment&&<div style={{marginTop:6,padding:'5px 9px',fontSize:10,color:'var(--ink2)',lineHeight:1.5,background:'var(--s2)',border:'1px dashed var(--org2)',borderRadius:5}}>
          건물측에서 <strong style={{color:'var(--org)'}}>{fWon(cd.buildingFundAmount||0)}</strong>을 투자 → 당사가 공사비를 집행하고 <strong style={{color:'var(--org)'}}>차액(투자금 − 공사비)</strong>을 마진으로 가져갑니다. <span style={{color:'var(--ink3)'}}>※ 공사비 탭 표시에만 반영</span>
        </div>}
      </div>

      <div className="card">
        <div className="card-title">🔌 충전기 항목 (단가: 원, 부가세별도)</div>
        <div className="cost-table-scroll">
          <div>
        {/* header: kW | 모델 | 위치 | 수량 | 단가(원) | 공급가액 | del */}
        <div style={{display:'grid',gridTemplateColumns:'58px 100px 52px 46px 108px 96px 22px',gap:4,padding:'3px 0',borderBottom:'2px solid var(--bd)',marginBottom:3}}>
          {['kW','모델','위치','수량','단가(원)','공급가액',''].map(h=>(
            <div key={h} style={{fontSize:9,fontWeight:700,color:'var(--ink3)',textTransform:'uppercase',display:'flex',alignItems:'center'}}>{h}</div>
          ))}
        </div>
        {(cd.chargerItems||[]).map(item=>{
          const models=CHARGER_MODELS[item.kw]||['기타'];
          const sub=(item.qty||0)*(item.unitPrice||0);
          return <div key={item.id} style={{display:'grid',gridTemplateColumns:'58px 100px 52px 46px 108px 96px 22px',gap:4,padding:'3px 0',borderBottom:'1px solid var(--bd)',alignItems:'center'}}>
            <select className="fsel" style={{fontSize:11,padding:'4px 4px'}} value={item.kw}
              onChange={e=>{const nkw=parseFloat(e.target.value);updChargerItem(item.id,{kw:nkw,model:CHARGER_MODELS[nkw]?.[0]||'기타'});}}>
              {CHARGER_KW.map(k=><option key={k} value={k}>{k}kW</option>)}
            </select>
            <select className="fsel" style={{fontSize:10,padding:'4px 3px'}} value={item.model}
              onChange={e=>updChargerItem(item.id,{model:e.target.value})}>
              {models.map(m=><option key={m}>{m}</option>)}
            </select>
            <select className="fsel" style={{fontSize:11,padding:'4px 3px'}} value={item.location}
              onChange={e=>updChargerItem(item.id,{location:e.target.value})}>
              {['옥내','옥외'].map(l=><option key={l}>{l}</option>)}
            </select>
            <input className="finput" type="number" style={{fontSize:11,padding:'4px 4px'}} value={item.qty||''} placeholder="0"
              onChange={e=>updChargerItem(item.id,{qty:+e.target.value})}/>
            <NumInput style={{fontSize:11,padding:'4px 4px'}} value={item.unitPrice||0}
              onChange={v=>updChargerItem(item.id,{unitPrice:v})}/>
            <div className="cir-val" style={{fontSize:10}}>{sub>0?fWon(sub):'—'}</div>
            <button className="btn-ico" style={{padding:'2px 4px',fontSize:10}} onClick={()=>delChargerItem(item.id)}>✕</button>
          </div>;
        })}
          </div>
        </div>
        <div style={{marginTop:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <button className="btn-s" style={{fontSize:10}} onClick={addChargerItem}>+ 충전기 추가</button>
          {ct.chargerExVAT>0&&<VatBreak ex={ct.chargerExVAT} label="충전기 소계"/>}
        </div>
      </div>

      <div className="card">
        <div className="card-title">🪵 스탠드폴 & 캐노피 (원, 부가세별도)</div>
        <div className="cost-pair-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <div className="flbl" style={{marginBottom:5}}>🪵 스탠드폴</div>
            <div className="fgrid">
              <div className="fg"><div className="flbl">수량</div><input className="finput" type="number" value={cd.standQty||''} placeholder="0" onChange={e=>set('standQty',+e.target.value)}/></div>
              <div className="fg"><div className="flbl">단가 (원)</div><NumInput value={cd.standUnitPrice||0} onChange={v=>set('standUnitPrice',v)}/></div>
            </div>
            {ct.standExVAT>0&&<VatBreak ex={ct.standExVAT}/>}
          </div>
          <div>
            <div className="flbl" style={{marginBottom:5}}>⛺ 캐노피 (Case C)</div>
            <div className="fgrid">

            {l:'스탠드폴',      ex:ct.standExVAT,   sub:ct.subsidyStandEx,   meta:standMeta},
            {l:'캐노피',        ex:ct.canopyExVAT,  sub:ct.subsidyCanopyEx,  meta:canopyMeta},
            {l:'전기공사비',    ex:ct.elecExVAT,    sub:ct.subsidyElecEx},
            {l:'사용전검사비',  ex:ct.inspEx,        off:!cd.includeInsp},
            {l:'전기안전점검비',ex:ct.safetyEx,      off:!cd.includeSafety},
            {l:'한전불입금',    ex:ct.kepcoEx,       off:ct.kepcoEx===0, sub:ct.subsidyKepcoEx},
            {l:'감리비',        ex:ct.supervEx,      off:!cd.includeSupv},

            {l:'충전기',        ex:ct.chargerExVAT, sub:ct.subsidyChargerEx, meta:chargerMeta},

        <div style={{display:'grid',gridTemplateColumns:cols,gap:6,padding:'4px 0'}}>

        {/* 1기당 공사비 */}

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:600,color:'var(--ink2)'}}>1기당 공사비 ({ct.totalChargers}기 기준) <span style={{fontSize:8,color:'var(--org)',fontWeight:700}}>VAT별도</span></span>
                <span style={{fontSize:12,fontFamily:'IBM Plex Mono',fontWeight:700,color:'var(--ink)'}}>{fWon(perUnit)}</span>
              </div>
              <div style={{fontSize:9,color:'var(--ink3)',fontFamily:'IBM Plex Mono',lineHeight:1.5}}>

        {/* 🏢 건물주 투자 박스 — 보조금 미신청 + 건물주 투자 모드 */}

          const totEx=activeCaseType==='C'?ct.totalCEx:ct.totalBEx;

            <div style={{marginTop:8,padding:'8px 10px',background:'var(--orgd)',border:'1px solid var(--org2)',borderRadius:6}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6,gap:8,flexWrap:'wrap'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--org)'}}>🏢 건물측 투자 정산</div>

                  <span style={{fontSize:9,color:'var(--ink3)',fontWeight:600}}>참고 마진율</span>

                    className="cp-input"
                    type="number"
                    min="0"
                    max="100"
                    step="0.5"
                    value={cd.buildingMarginRate||0}
                    onChange={e=>set('buildingMarginRate',parseFloat(e.target.value)||0)}
                    style={{width:48,fontSize:10,fontWeight:700,textAlign:'right',color:'var(--org)',padding:'2px 4px'}}

                  <span style={{fontSize:9,color:'var(--org)',fontWeight:700}}>%</span>
                  <span style={{fontSize:9,color:'var(--ink3)',marginLeft:4}}>→ 권장 투자금</span>
                  <span style={{fontSize:10,fontFamily:'IBM Plex Mono',color:'var(--ink2)',fontWeight:700}}>{fWon(recommendedFund)}</span>
                </div>

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:11}}>
                <span style={{color:'var(--org)',fontWeight:600}}>건물측 투자금액 (입금)</span>
                <span style={{fontFamily:'IBM Plex Mono',color:'var(--org)',fontWeight:700}}>+{fWon(fundEx)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:11}}>
                <span style={{color:'var(--ink2)'}}>공사비 합계 (집행)</span>
                <span style={{fontFamily:'IBM Plex Mono',color:'var(--ink2)',fontWeight:600}}>−{fWon(totEx)}</span>

                <span style={{fontSize:12,fontWeight:700,color:marginPositive?'var(--grn)':'var(--red)'}}>{marginPositive?'당사 마진 (차액)':'당사 추가 투자 (부족분)'} <span style={{fontSize:9,fontWeight:700,marginLeft:4}}>VAT별도</span></span>
                <span style={{fontSize:13,fontFamily:'IBM Plex Mono',fontWeight:700,color:marginPositive?'var(--grn)':'var(--red)'}}>{marginPositive?'+':''}{fWon(Math.abs(marginEx))}</span>

function SaveStatus(){
  const [st,setSt]=useState('idle');
  useEffect(()=>{
    window._onSaveStatus = s => setSt(s);
    return ()=>{ window._onSaveStatus=null; };
  },[]);
  const colors = {idle:'rgba(255,255,255,.35)',saving:'rgba(245,158,11,.9)',saved:'rgba(34,197,94,.9)',error:'rgba(239,68,68,.9)'};
  const labels = {idle:'대기',saving:'저장중...',saved:'✓ 저장완료',error:'⚠ 저장실패'};
  return <span style={{fontSize:9,color:colors[st]||colors.idle,fontWeight:st==='error'?700:400,transition:'color .3s'}}>
    {labels[st]||labels.idle}
  </span>;
}

function App(){
  const [sites,setSites]=useState(SITES0);
  const [sid,setSid]=useState(1);
  const [nid,setNid]=useState(10);
  const [costMap,setCostMap]=useState({1:{...COST0,chargerItems:[...COST0.chargerItems]}});
  const [dataLoaded,setDataLoaded]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [sbSearch,setSbSearch]=useState('');
  const [cardScale,setCardScale]=useState(1);
  const cardW = Math.round(420 * cardScale);
  const nameFz = Math.round(13 * cardScale);
  const metaFz = Math.round(11 * cardScale);
  const padH = Math.round(8 * cardScale);
  const padV = Math.round(10 * cardScale);
  const [sbFilter,setSbFilter]=useState('전체');
  const [checkedIds,setCheckedIds]=useState([]);
  const [deleteMode,setDeleteMode]=useState(false);
  const [editingSite,setEditingSite]=useState(null);
  const updateSite = (patch) => setSites(ss=>ss.map(s=>s.id===sid?{...s,...patch}:s));

  // Load data
  window._onUserSelected = async ()=>{
    const saved = await loadLS();
    if(saved){
      if(saved.sites) setSites(saved.sites);
      if(saved.sid) setSid(saved.sid);
      if(saved.nid) setNid(saved.nid);
      if(saved.costMap) setCostMap(saved.costMap);
    }
    setDataLoaded(true);
  };
  useEffect(()=>{ if(_currentUser) window._onUserSelected(); },[]);

  // Auto-save
  useEffect(()=>{
    if(!dataLoaded) return;
    const t=setTimeout(()=>saveLS({sites,sid,nid,costMap}),800);
    return ()=>clearTimeout(t);
  },[sites,sid,nid,costMap,dataLoaded]);

  // Firestore real-time sync — 다른 기기에서의 변경 실시간 반영
  useEffect(()=>{
    if(!_DOC||!dataLoaded) return;
    const unsub = _DOC.onSnapshot(snap=>{
      if(_isSavingToFirebase) return;
      if(snap.exists){
        const data=snap.data();
        if(data.sites)setSites(data.sites);
        if(data.sid!=null)setSid(data.sid);
        if(data.nid!=null)setNid(data.nid);
        if(data.costMap)setCostMap(data.costMap);
      }
    });
    return ()=>unsub();
  },[dataLoaded]);

  const site = sites.find(s=>s.id===sid) || sites[0];
  const cd = costMap[sid] || {...COST0,chargerItems:[...COST0.chargerItems]};
  const ct = useMemo(()=>calcCostTotals(cd),[cd]);
  const updCost = p => setCostMap(m=>({...m,[sid]:{...cd,...p}}));

  function addSite(s){
    const id=nid;
    const ns=[...sites,{...s,id}];
    setSites(ns); setSid(id); setNid(nid+1);
  }
  function delSites(ids){
    if(!ids.length)return;
    const ns=sites.filter(s=>!ids.includes(s.id));
    if(!ns.length) return alert('최소 1개 현장이 필요합니다.');
    setSites(ns);
    if(ids.includes(sid)) setSid(ns[0].id);
    const nc={...costMap}; ids.forEach(id=>delete nc[id]);
    setCostMap(nc); setCheckedIds([]); setDeleteMode(false);
  }
  function copySite(){
    const orig=sites.find(s=>s.id===sid);
    if(!orig)return;
    const id=nid;
    const ns=[...sites,{...orig,id,name:orig.name+' (복사)'}];
    const origCost=costMap[sid]||COST0;
    setSites(ns); setSid(id); setNid(nid+1);
    setCostMap(m=>({...m,[id]:JSON.parse(JSON.stringify(origCost))}));
  }

  // Filter sites
  const filteredSites = sites.filter(s=>{
    const rgMatch = sbFilter==='전체' || s.region===sbFilter;
    const searchMatch = !sbSearch || s.name.toLowerCase().includes(sbSearch.toLowerCase()) || (s.address||'').toLowerCase().includes(sbSearch.toLowerCase());
    return rgMatch && searchMatch;
  });

  const totalChargers = sites.reduce((s,site)=>{
    const c=costMap[site.id]||COST0;
    return s + (c.chargerItems||[]).reduce((s2,i)=>s2+(i.qty||0),0);
  },0);

  // Migration check
  const [migrated,setMigrated]=useState(false);
  const doMigrate = async ()=>{
    if(!confirm('기존 시뮬레이션 데이터에서 31개 현장을 가져옵니다. 현재 데이터가 덮어씌워집니다. 계속하시겠습니까?')) return;
    setSites(MIGRATION_DATA.sites);
    setSid(MIGRATION_DATA.sid);
    setNid(MIGRATION_DATA.nid);
    setCostMap(MIGRATION_DATA.costMap);
    setMigrated(true);
    alert('마이그레이션 완료! ' + MIGRATION_DATA.sites.length + '개 현장이 로드되었습니다.');
  };

  return <div className="layout" style={{height:'100vh',display:'flex',flexDirection:'column'}}>
    {/* Header */}
    <div className="hdr">
      <div className="hdr-logo">
        <span>🔧 EV 충전기 시공관리</span>
        <div className="hdr-sep"></div>
        <span className="hdr-sub">Construction Manager</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <SaveStatus/>
        <button onClick={()=>exportData({sites,sid,nid,costMap})}
          style={{background:'none',border:'1px solid rgba(255,255,255,.25)',borderRadius:4,padding:'3px 9px',fontSize:10,color:'rgba(255,255,255,.75)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>⬇ 백업</button>
        <button onClick={()=>importData(data=>{ setSites(data.sites); setSid(data.sid||data.sites[0]?.id||1); setNid(data.nid||100); setCostMap(data.costMap); })}
          style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',borderRadius:4,padding:'3px 9px',fontSize:10,color:'rgba(255,255,255,.9)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>⬆ 복원</button>
        <button onClick={doMigrate}
          style={{background:'rgba(245,158,11,.2)',border:'1px solid rgba(245,158,11,.5)',borderRadius:4,padding:'3px 9px',fontSize:10,color:'rgba(245,158,11,.9)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>📥 기존 데이터 이관</button>
        <span className="hdr-badge">CONSTRUCTION</span>
      </div>
    </div>

    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      {/* Sidebar */}
      <aside className="sb" style={{width:cardW}}>
        <div className="sb-sec" style={{display:'flex',flexDirection:'column',gap:5}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div className="sb-label" style={{lineHeight:1.3}}>현장<br/>목록</div>
            <div style={{display:'flex',gap:4}}>
              <button onClick={()=>setShowAdd(true)} style={{padding:'4px 8px',fontSize:10,fontWeight:600,background:'var(--accl)',border:'1px solid var(--acc)',borderRadius:4,color:'var(--acc)',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:1,lineHeight:1.2}}>
                <span style={{fontSize:13}}>+</span><span>추가</span>
              </button>
              <button onClick={copySite} style={{padding:'4px 8px',fontSize:10,fontWeight:600,background:'var(--orgd)',border:'1px solid var(--org2)',borderRadius:4,color:'var(--org)',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:1,lineHeight:1.2}}>
                <span style={{fontSize:13}}>⧉</span><span>복사</span>
              </button>
              <button onClick={()=>{if(deleteMode&&checkedIds.length)delSites(checkedIds);else{setDeleteMode(!deleteMode);setCheckedIds([]);}}} style={{padding:'4px 8px',fontSize:10,fontWeight:600,background:deleteMode?'var(--red)':'var(--redd)',border:`1px solid ${deleteMode?'var(--red)':'var(--red2)'}`,borderRadius:4,color:deleteMode?'#fff':'var(--red)',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:1,lineHeight:1.2}}>
                <span style={{fontSize:13}}>−</span><span>{deleteMode?(checkedIds.length?'확인':'취소'):'삭제'}</span>
              </button>
            </div>
          </div>
        </div>

        {/* Filter & Search */}
        <div style={{padding:'0 8px 8px',display:'flex',flexDirection:'column',gap:5,borderBottom:'1px solid var(--bd)'}}>
          <select style={{background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 6px',fontSize:10,color:'var(--ink)',fontFamily:'inherit',outline:'none',width:'100%'}}
            value={sbFilter} onChange={e=>setSbFilter(e.target.value)}>
            <option value="전체">전체 지역</option>
            {REGIONS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <button onClick={()=>setCardScale(s=>Math.max(0.7,+(s-0.1).toFixed(1)))} style={{width:28,height:24,fontSize:14,fontWeight:700,border:'1px solid var(--bd)',borderRadius:4,background:'var(--s2)',cursor:'pointer',color:'var(--ink)',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
            <span style={{fontSize:9,color:'var(--ink3)',fontWeight:600,minWidth:28,textAlign:'center'}}>{Math.round(cardScale*100)}%</span>
            <button onClick={()=>setCardScale(s=>Math.min(1.5,+(s+0.1).toFixed(1)))} style={{width:28,height:24,fontSize:14,fontWeight:700,border:'1px solid var(--bd)',borderRadius:4,background:'var(--s2)',cursor:'pointer',color:'var(--ink)',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
          </div>
          <div style={{position:'relative'}}>
            <input placeholder="🔍 현장명 검색" value={sbSearch} onChange={e=>setSbSearch(e.target.value)}
              style={{width:'100%',padding:'5px 28px 5px 8px',fontSize:10,border:'1px solid var(--bd)',borderRadius:5,background:'var(--s2)',color:'var(--ink)',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            {sbSearch&&<button onClick={()=>setSbSearch('')}
              style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--ink3)',padding:'0 2px',lineHeight:1}}>×</button>}
          </div>
        </div>

        {/* Site list */}
        <div className="sb-list">
          {filteredSites.map(s=>{
            const c=costMap[s.id]||COST0;
            const total=(c.chargerItems||[]).reduce((s2,i)=>s2+(i.qty||0),0);
            return <div key={s.id} className={`sitem ${s.id===sid?'active':''}`}
              style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',padding:`${padH}px ${padV}px`}}
              onClick={()=>{if(!deleteMode)setSid(s.id);}}>
              {deleteMode&&<div onClick={e=>{e.stopPropagation();setCheckedIds(p=>p.includes(s.id)?p.filter(x=>x!==s.id):[...p,s.id]);}}
                style={{width:16,height:16,borderRadius:3,border:`2px solid ${checkedIds.includes(s.id)?'var(--red)':'var(--bd)'}`,background:checkedIds.includes(s.id)?'var(--red)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                {checkedIds.includes(s.id)&&<span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}
              </div>}
              <div style={{flex:1,minWidth:0}}>
                <div className="sitem-name" style={{fontSize:nameFz}}>{s.name}</div>
                <div className="sitem-meta" style={{fontSize:metaFz}}>{s.region} · {total}기</div>
              </div>
            </div>;
          })}
        </div>

        <div className="sb-foot">
          <div className="sfstat"><div className="n">{filteredSites.length}</div><div className="l">현장</div></div>
          <div className="sfstat"><div className="n">{totalChargers}</div><div className="l">총 기수</div></div>
        </div>
      </aside>

      {/* Main content */}
      <main className="main" style={{flex:1,overflow:'auto'}}>
        {/* Topbar */}
        <div className="topbar">
          <div className="topbar-row1">
            <span className="site-name">{site.name}</span>
            <span className="site-loc">{site.address||site.region}</span>
            <button onClick={()=>setEditingSite({...site})} className="edit-btn" style={{position:'static',marginLeft:4}}>편집</button>
            <div className="charger-tags">
              {(cd.chargerItems||[]).filter(i=>i.qty>0).map((item,idx)=>
                <span key={idx} className="ctag">{item.kw}kW {item.qty}기({item.location})</span>
              )}
            </div>
          </div>
          <div className="kpi-strip">
            <div className="kpi" style={{flex:1.1}}>
              <div className="kl">총 충전기</div>
              <div className="kv">{ct.totalChargers}기</div>

            </div>
            <div className="kpi acc" style={{flex:1.2}}>
              <div className="kl">공사비 (VAT포함)</div>
              <div className="kv">{fW(ct.totalCMan)}</div>
              <div className="ks">공급가액 {fW(ct.totalCMan - toMan(ct.totalCVT))}</div>
            </div>
            {cd.subsidyApplied && <div className="kpi grn">
              <div className="kl">보조금 차감 후</div>
              <div className="kv">{fW(ct.netCMan)}</div>
              <div className="ks">보조금 {fW(toMan(ct.subsidyAmt))}</div>
            </div>}
            <div className="kpi">
              <div className="kl">계약전력</div>
              <div className="kv" style={{fontSize:11}}>{cd.contractKW||mergePowerPoints(cd.powerPoints)||0}kW</div>
            </div>
          </div>
        </div>

        {/* CostTab directly rendered */}
        <div className="content" style={{padding:12}}>
          <CostTab site={site} cd={cd} sm={{}} updCost={updCost}/>
        </div>
      </main>
    </div>

    {editingSite && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.4)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)setEditingSite(null);}}>
      <div style={{background:'#fff',borderRadius:10,padding:20,width:380,maxHeight:'80vh',overflow:'auto'}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>현장 정보 편집</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:'var(--ink3)',marginBottom:3}}>현장명</div>
            <input className="cp-input" value={editingSite.name||''} onChange={e=>setEditingSite(p=>({...p,name:e.target.value}))} style={{fontSize:11}}/>
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:'var(--ink3)',marginBottom:3}}>주소</div>
            <input className="cp-input" value={editingSite.address||''} onChange={e=>setEditingSite(p=>({...p,address:e.target.value}))} style={{fontSize:11}}/>
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:'var(--ink3)',marginBottom:3}}>지역</div>
            <select className="cp-input" value={editingSite.region||'서울'} onChange={e=>setEditingSite(p=>({...p,region:e.target.value}))} style={{fontSize:11}}>
              {REGIONS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>

        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:6,marginTop:14}}>
          <button onClick={()=>setEditingSite(null)} style={{padding:'6px 14px',fontSize:11,border:'1px solid var(--bd)',borderRadius:5,background:'var(--s2)',cursor:'pointer',fontFamily:'inherit'}}>취소</button>
          <button onClick={()=>{updateSite(editingSite);setEditingSite(null);}}
            style={{padding:'6px 14px',fontSize:11,border:'none',borderRadius:5,background:'var(--acc)',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>저장</button>
        </div>
      </div>
    </div>}

    {showAdd && <AddModal onAdd={addSite} onClose={()=>setShowAdd(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
window._appLoaded = true;
// React 마운트 후 확실히 Firestore 로드
setTimeout(function(){
  if(window._onUserSelected) window._onUserSelected();
}, 500);
</script>
</body></html>
